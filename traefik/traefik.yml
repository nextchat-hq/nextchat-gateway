global:
  checkNewVersion: false
  sendAnonymousUsage: false

api: {}

ping: {}

entryPoints:
  web:
    address: ":80"

  websecure:
    address: ":443"

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    watch: true

  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  cloudflare:
    acme:
      email: kifu.dev@gmail.com
      storage: /letsencrypt/acme.json

      dnsChallenge:
        provider: cloudflare

log:
  level: INFO

accessLog: {}
