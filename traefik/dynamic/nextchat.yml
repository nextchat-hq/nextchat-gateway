http:

  # ============================================================
  # SERVICES — trỏ trực tiếp đến từng container trên nextchat-core
  # ============================================================
  services:

    # nginx: chỉ serve static files
    nginx-static:
      loadBalancer:
        servers:
          - url: "http://192.168.1.120:8080"
        passHostHeader: true

    # nextchat-web app
    nextchat-web:
      loadBalancer:
        servers:
          - url: "http://192.168.1.120:8081"
        passHostHeader: true

    # nextchat-admin panel
    nextchat-admin:
      loadBalancer:
        servers:
          - url: "http://192.168.1.120:8082"
        passHostHeader: true

    # synapse Matrix homeserver
    synapse:
      loadBalancer:
        servers:
          - url: "http://192.168.1.120:8008"
        passHostHeader: true
        responseForwarding:
          flushInterval: "100ms"

    # sygnal push notification
    sygnal:
      loadBalancer:
        servers:
          - url: "http://192.168.1.120:5000"
        passHostHeader: true

    # grafana monitor
    grafana:
      loadBalancer:
        servers:
          - url: "http://172.31.36.233:3000"
        passHostHeader: true

  # ============================================================
  # MIDDLEWARES
  # ============================================================
  middlewares:

    # Security headers
    secure-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true

    # Forward proto header
    forward-https:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"

  # ============================================================
  # ROUTERS
  # ============================================================
  routers:

    # ------ nextchat.vn & www.nextchat.vn ------

    # Static files: .well-known, robots.txt, sitemap.xml, legal, images, css
    nextchat-static:
      rule: "(Host(`nextchat.vn`) || Host(`www.nextchat.vn`)) && (PathPrefix(`/.well-known`) || Path(`/robots.txt`) || Path(`/sitemap.xml`) || Path(`/view-transitions.css`) || PathPrefix(`/img`) || PathRegexp(`^/(privacy|legal|acceptable-use-policy|copyright|help|cookie-policy)$`) || PathRegexp(`^/vi/(privacy|legal|acceptable-use-policy|copyright|help|cookie-policy)$`))"
      priority: 30
      entryPoints:
        - web
        - websecure
      service: nginx-static
      middlewares:
        - secure-headers
        - gzip@file

    # Push notification — priority cao hơn /_matrix để không bị matrix router bắt
    nextchat-push:
      rule: "(Host(`nextchat.vn`) || Host(`www.nextchat.vn`)) && Path(`/_matrix/push/v1/notify`)"
      priority: 20
      entryPoints:
        - web
        - websecure
      service: sygnal
      middlewares:
        - forward-https

    # Matrix Client API & Synapse admin
    nextchat-matrix:
      rule: "(Host(`nextchat.vn`) || Host(`www.nextchat.vn`)) && (PathPrefix(`/_matrix`) || PathPrefix(`/_synapse`))"
      priority: 10
      entryPoints:
        - web
        - websecure
      service: synapse
      middlewares:
        - forward-https

    # Web app — catch-all
    nextchat-web:
      rule: "Host(`nextchat.vn`) || Host(`www.nextchat.vn`)"
      priority: 1
      entryPoints:
        - web
        - websecure
      service: nextchat-web
      middlewares:
        - secure-headers
        - gzip@file
        - forward-https

    # ------ admin.nextchat.vn ------
    nextchat-admin:
      rule: Host(`admin.nextchat.vn`)
      entryPoints:
        - web
        - websecure
      service: nextchat-admin
      middlewares:
        - secure-headers
        - gzip@file
        - forward-https

    # ------ monitor.nextchat.vn ------
    nextchat-monitor:
      rule: Host(`monitor.nextchat.vn`)
      entryPoints:
        - web
        - websecure
      service: grafana
      middlewares:
        - secure-headers
        - forward-https
